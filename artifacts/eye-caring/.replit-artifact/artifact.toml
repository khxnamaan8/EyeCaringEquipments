kind = "web"
previewPath = "/"
title = "Eye Caring Equipments"
version = "1.0.0"
id = "artifacts/eye-caring"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23163

[services.development]
run = "pnpm --filter @workspace/eye-caring run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eye-caring", "run", "build" ]
publicDir = "artifacts/eye-caring/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23163"
BASE_PATH = "/"
